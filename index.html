<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PubMed Recherche Tool</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        #search-form { display: flex; gap: 0.5rem; margin: 1rem 0; }
        #query { flex: 1; padding: 0.5rem; font-size: 1rem; }
        button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
        #status { color: #666; margin: 0.5rem 0; }
        #results { white-space: pre-wrap; background: #f5f5f5; padding: 1rem; border-radius: 4px; display: none; }
        #api-key-setup { background: #fff3cd; border: 1px solid #ffc107; padding: 1rem; border-radius: 4px; margin: 1rem 0; }
        #api-key-setup input { width: 100%; padding: 0.5rem; font-size: 1rem; margin: 0.5rem 0; box-sizing: border-box; }
        #api-key-status { font-size: 0.85rem; color: #666; margin: 0.5rem 0; }
        #api-key-status button { font-size: 0.85rem; padding: 0.2rem 0.5rem; margin-left: 0.5rem; }
    </style>
</head>
<body>
    <h1>PubMed Recherche Tool</h1>

    <div id="api-key-setup" style="display:none;">
        <strong>Claude API Key benötigt</strong>
        <p>Für die Analyse der Literatur wird ein Anthropic API Key benötigt. Der Key wird nur lokal in deinem Browser gespeichert und nie übertragen.</p>
        <input type="password" id="api-key-input" placeholder="sk-ant-... (Anthropic API Key)">
        <button id="api-key-save">Speichern</button>
    </div>
    <div id="api-key-status"></div>

    <form id="search-form">
        <input type="text" id="query" placeholder="Suchbegriff eingeben, z.B. 'migraine treatment'" required>
        <button type="submit">Suchen</button>
    </form>
    <div id="status"></div>
    <div id="results"></div>

<script>
const ESEARCH_URL = 'https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi';
const EFETCH_URL = 'https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi';
const CLAUDE_API_URL = 'https://api.anthropic.com/v1/messages';
const CLAUDE_MODEL = 'claude-sonnet-4-6';
const API_KEY_STORAGE = 'pubmed-tool-anthropic-key';

// --- API Key Verwaltung ---
function getApiKey() {
    return localStorage.getItem(API_KEY_STORAGE) || '';
}

function saveApiKey(key) {
    localStorage.setItem(API_KEY_STORAGE, key);
}

function updateApiKeyUI() {
    const setupEl = document.getElementById('api-key-setup');
    const statusEl = document.getElementById('api-key-status');
    const key = getApiKey();

    if (key) {
        setupEl.style.display = 'none';
        const masked = key.substring(0, 10) + '...' + key.substring(key.length - 4);
        statusEl.innerHTML = `API Key gespeichert (${masked}) <button id="api-key-change">Ändern</button>`;
        document.getElementById('api-key-change').addEventListener('click', () => {
            setupEl.style.display = 'block';
            document.getElementById('api-key-input').value = '';
            document.getElementById('api-key-input').focus();
        });
    } else {
        setupEl.style.display = 'block';
        statusEl.textContent = '';
    }
}

document.getElementById('api-key-save').addEventListener('click', () => {
    const input = document.getElementById('api-key-input');
    const key = input.value.trim();
    if (!key) return;
    if (!key.startsWith('sk-ant-')) {
        alert('Der API Key sollte mit "sk-ant-" beginnen. Bitte prüfe den Key.');
        return;
    }
    saveApiKey(key);
    updateApiKeyUI();
});

updateApiKeyUI();

// Deutsche → englische Übersetzung häufiger neurologischer/medizinischer Begriffe
const MEDICAL_TERMS_DE_EN = {
    'schlaganfall': 'stroke',
    'hirnschlag': 'stroke',
    'migräne': 'migraine',
    'kopfschmerz': 'headache',
    'kopfschmerzen': 'headache',
    'epilepsie': 'epilepsy',
    'anfälle': 'seizures',
    'krampfanfall': 'seizure',
    'krampfanfälle': 'seizures',
    'demenz': 'dementia',
    'alzheimer': 'alzheimer',
    'parkinson': 'parkinson',
    'multiple sklerose': 'multiple sclerosis',
    'nervenschmerzen': 'neuropathic pain',
    'neuropathie': 'neuropathy',
    'polyneuropathie': 'polyneuropathy',
    'gehirntumor': 'brain tumor',
    'hirntumor': 'brain tumor',
    'hirnblutung': 'cerebral hemorrhage',
    'gehirnerschütterung': 'concussion',
    'schwindel': 'vertigo',
    'tremor': 'tremor',
    'lähmung': 'paralysis',
    'spastik': 'spasticity',
    'meningitis': 'meningitis',
    'enzephalitis': 'encephalitis',
    'behandlung': 'treatment',
    'therapie': 'therapy',
    'diagnose': 'diagnosis',
    'diagnostik': 'diagnostics',
    'prognose': 'prognosis',
    'ursachen': 'etiology',
    'symptome': 'symptoms',
    'risikofaktoren': 'risk factors',
    'prävention': 'prevention',
    'rehabilitation': 'rehabilitation',
    'kinder': 'pediatric',
    'erwachsene': 'adults',
    'ältere': 'elderly',
    'leitlinie': 'guideline',
    'leitlinien': 'guidelines',
    'rückenschmerzen': 'back pain',
    'bandscheibenvorfall': 'disc herniation',
    'restless legs': 'restless legs syndrome',
    'schlafstörungen': 'sleep disorders',
    'tinnitus': 'tinnitus',
    'gleichgewichtsstörung': 'balance disorder',
    'muskelerkrankung': 'myopathy',
    'nervenentzündung': 'neuritis',
    'trigeminusneuralgie': 'trigeminal neuralgia',
    'cluster-kopfschmerz': 'cluster headache',
    'spannungskopfschmerz': 'tension headache',
    'schädelhirntrauma': 'traumatic brain injury',
    'bewusstlosigkeit': 'syncope',
    'ohnmacht': 'syncope',
    'gedächtnisstörung': 'memory disorder',
    'aphasie': 'aphasia',
    'ataxie': 'ataxia',
    'dystonie': 'dystonia',
    'myasthenie': 'myasthenia',
    'guillain-barré': 'guillain-barre',
    'als': 'amyotrophic lateral sclerosis',
    'amyotrophe lateralsklerose': 'amyotrophic lateral sclerosis',
    'neurodegeneration': 'neurodegeneration',
    'und': 'AND',
    'oder': 'OR',
    'bei': '',
    'mit': '',
    'durch': '',
    'nach': 'after',
    'vor': 'before',
    'neue': 'new',
    'aktuelle': 'current',
};

function optimizeQuery(rawInput) {
    let query = rawInput.trim().toLowerCase();

    // Ersetze deutsche Mehrwort-Terme zuerst (längste zuerst)
    const sortedTerms = Object.entries(MEDICAL_TERMS_DE_EN)
        .sort((a, b) => b[0].length - a[0].length);

    for (const [de, en] of sortedTerms) {
        const regex = new RegExp(`\\b${de.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')}\\b`, 'gi');
        query = query.replace(regex, en);
    }

    // Leere Ersetzungen und Mehrfach-Leerzeichen bereinigen
    query = query.replace(/\s+/g, ' ').trim();

    // Review-Artikel bevorzugen: Suche zuerst mit Review-Filter
    const reviewQuery = `(${query}) AND (review[pt] OR systematic review[pt] OR meta-analysis[pt])`;

    return { reviewQuery, fallbackQuery: query };
}

async function fetchWithTimeout(url, timeoutMs = 30000) {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), timeoutMs);
    try {
        const response = await fetch(url, { signal: controller.signal });
        return response;
    } catch (err) {
        if (err.name === 'AbortError') {
            throw new Error('Zeitüberschreitung: PubMed antwortet nicht. Bitte später erneut versuchen.');
        }
        if (!navigator.onLine) {
            throw new Error('Keine Internetverbindung. Bitte Verbindung prüfen und erneut versuchen.');
        }
        throw new Error('Netzwerkfehler: PubMed ist nicht erreichbar. Bitte später erneut versuchen.');
    } finally {
        clearTimeout(timeout);
    }
}

async function searchPubMed(term) {
    const params = new URLSearchParams({
        db: 'pubmed',
        term,
        retmax: '50',
        mindate: '2000',
        maxdate: '2099',
        datetype: 'pdat',
        retmode: 'json',
        sort: 'relevance'
    });

    const response = await fetchWithTimeout(`${ESEARCH_URL}?${params}`);
    if (response.status === 429) throw new Error('Zu viele Anfragen an PubMed. Bitte 10 Sekunden warten und erneut versuchen.');
    if (response.status >= 500) throw new Error('PubMed-Server vorübergehend nicht verfügbar. Bitte später erneut versuchen.');
    if (!response.ok) throw new Error(`PubMed-Suche fehlgeschlagen (Fehlercode ${response.status}).`);
    return response.json();
}

async function fetchArticles(pmids) {
    if (pmids.length === 0) return [];

    const params = new URLSearchParams({
        db: 'pubmed',
        id: pmids.join(','),
        retmode: 'xml'
    });

    const response = await fetchWithTimeout(`${EFETCH_URL}?${params}`, 60000);
    if (response.status === 429) throw new Error('Zu viele Anfragen an PubMed. Bitte 10 Sekunden warten und erneut versuchen.');
    if (response.status >= 500) throw new Error('PubMed-Server vorübergehend nicht verfügbar. Bitte später erneut versuchen.');
    if (!response.ok) throw new Error(`Artikel konnten nicht geladen werden (Fehlercode ${response.status}).`);

    const xmlText = await response.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlText, 'text/xml');

    const articles = [];
    for (const article of doc.querySelectorAll('PubmedArticle')) {
        const pmid = article.querySelector('PMID')?.textContent || '';

        const title = article.querySelector('ArticleTitle')?.textContent || 'Kein Titel';

        // Autoren: LastName + Initials
        const authors = [];
        for (const author of article.querySelectorAll('Author')) {
            const lastName = author.querySelector('LastName')?.textContent;
            const initials = author.querySelector('Initials')?.textContent;
            if (lastName) authors.push(initials ? `${lastName} ${initials}` : lastName);
        }

        // Journal
        const journal = article.querySelector('Journal ISOAbbreviation')?.textContent
            || article.querySelector('Journal Title')?.textContent || '';

        // Jahr: aus PubDate oder ArticleDate
        const year = article.querySelector('PubDate Year')?.textContent
            || article.querySelector('ArticleDate Year')?.textContent || '';

        // Abstract: kann aus mehreren AbstractText-Elementen bestehen
        const abstractParts = [];
        for (const part of article.querySelectorAll('AbstractText')) {
            const label = part.getAttribute('Label');
            const text = part.textContent;
            abstractParts.push(label ? `${label}: ${text}` : text);
        }
        const abstract = abstractParts.join('\n') || 'Kein Abstract verfügbar.';

        articles.push({ pmid, title, authors, journal, year, abstract });
    }

    return articles;
}

// Grobe Token-Schätzung (~4 Zeichen pro Token)
function estimateTokens(text) {
    return Math.ceil(text.length / 4);
}

const TOKEN_LIMIT = 150000; // Sicherheitspuffer unter Claudes 200k Limit
const FALLBACK_ARTICLE_COUNT = 30;

async function synthesizeWithClaude(articles, userQuery) {
    const apiKey = getApiKey();
    if (!apiKey) throw new Error('Bitte zuerst den Anthropic API Key eingeben.');

    // Token-Limit prüfen: bei Überschreitung auf Top-30 reduzieren
    let usedArticles = articles;
    let truncated = false;

    const fullText = articles.map(a => a.abstract).join(' ');
    if (estimateTokens(fullText) > TOKEN_LIMIT) {
        usedArticles = articles.slice(0, FALLBACK_ARTICLE_COUNT);
        truncated = true;
    }

    // Abstracts als nummerierte Liste für Claude aufbereiten
    const abstractsText = usedArticles.map((a, i) =>
        `[${i + 1}] ${a.authors[0] || 'Unbekannt'} (${a.year || 'o.J.'}): ${a.title}\nJournal: ${a.journal}\nAbstract: ${a.abstract}`
    ).join('\n\n---\n\n');

    const systemPrompt = `Du bist ein akademischer Literaturanalyst mit Spezialisierung auf Neurologie und Neurowissenschaften. Du schreibst für einen Facharzt für Neurologie.

Dein Output hat die Qualität einer wissenschaftlichen Einleitung (Introduction) eines Fachartikels.

Strikte Regeln:
- Sprache: IMMER Deutsch, aber Fachbegriffe dürfen in Klammern auf Englisch ergänzt werden
- Quellenverweise: Immer im Format [Erstautor Jahr], z.B. [Schmidt 2022]. Jede wesentliche Aussage muss belegt sein
- Evidenzbasis: Beziehe dich AUSSCHLIESSLICH auf die bereitgestellten Abstracts. Erfinde keine Quellen
- Präzision: Nenne konkrete Zahlen (Effektstärken, NNT, Odds Ratios, Konfidenzintervalle, p-Werte, Dosierungen) wenn in den Abstracts vorhanden
- Struktur: Ordne thematisch, nicht chronologisch. Fasse verwandte Ergebnisse zusammen statt Studie für Studie aufzulisten
- Stil: Sachlich-wissenschaftlich, keine Übertreibungen, keine Werturteile ohne Evidenz
- Widersprüche: Wenn Studien sich widersprechen, stelle beide Positionen dar mit jeweiligen Belegen
- Limitationen: Erwähne methodische Einschränkungen (kleine Fallzahlen, retrospektives Design etc.) wo relevant`;

    const userMessage = `Fragestellung: "${userQuery}"

Hier sind ${articles.length} relevante PubMed-Abstracts:

${abstractsText}

Erstelle folgende zwei Sektionen:

## Literatursynthese
Verfasse 3–5 Absätze, die den aktuellen Forschungsstand zur Fragestellung zusammenfassen. Struktur:
- Absatz 1: Überblick und Epidemiologie/Hintergrund
- Absatz 2–3: Zentrale Ergebnisse und Evidenz (mit konkreten Zahlen)
- Absatz 4: Aktuelle Therapieansätze oder diagnostische Strategien (falls relevant)
- Absatz 5: Zusammenfassende Bewertung der Evidenzlage
Jede wesentliche Aussage muss mit [Erstautor Jahr] belegt werden.

## Offene Fragen & Kontroversen
Nenne 3–6 konkrete offene Forschungsfragen oder kontroverse Punkte, die sich direkt aus den analysierten Abstracts ergeben. Formuliere als vollständige Sätze, nicht als Stichpunkte.`;

    async function callClaude(sysPrompt, usrMessage) {
        const resp = await fetch(CLAUDE_API_URL, {
            method: 'POST',
            headers: {
                'x-api-key': apiKey,
                'anthropic-version': '2023-06-01',
                'content-type': 'application/json',
                'anthropic-dangerous-direct-browser-access': 'true'
            },
            body: JSON.stringify({
                model: CLAUDE_MODEL,
                max_tokens: 4096,
                system: sysPrompt,
                messages: [{ role: 'user', content: usrMessage }]
            })
        });
        return resp;
    }

    let response = await callClaude(systemPrompt, userMessage);

    // Bei 400 (z.B. Token-Limit): Fallback auf Top-30 Abstracts und Retry
    if (response.status === 400 && !truncated && articles.length > FALLBACK_ARTICLE_COUNT) {
        usedArticles = articles.slice(0, FALLBACK_ARTICLE_COUNT);
        truncated = true;
        const fallbackAbstracts = usedArticles.map((a, i) =>
            `[${i + 1}] ${a.authors[0] || 'Unbekannt'} (${a.year || 'o.J.'}): ${a.title}\nJournal: ${a.journal}\nAbstract: ${a.abstract}`
        ).join('\n\n---\n\n');
        const fallbackMessage = userMessage.replace(abstractsText, fallbackAbstracts)
            .replace(`${articles.length} relevante`, `${usedArticles.length} relevante`);
        response = await callClaude(systemPrompt, fallbackMessage);
    }

    if (response.status === 401) throw new Error('Ungültiger API Key. Bitte prüfe deinen Anthropic API Key.');
    if (response.status === 429) throw new Error('API-Limit erreicht. Bitte einige Sekunden warten und erneut versuchen.');
    if (response.status >= 500) throw new Error('Claude API vorübergehend nicht verfügbar. Bitte später erneut versuchen.');
    if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error(`Claude API Fehler: ${errData.error?.message || response.status}`);
    }

    const data = await response.json();
    const resultText = data.content[0].text;
    return truncated
        ? resultText + `\n\n*Hinweis: Die Analyse wurde auf die ${usedArticles.length} relevantesten Artikel beschränkt (von ${articles.length} gefundenen).*`
        : resultText;
}

document.getElementById('search-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const rawQuery = document.getElementById('query').value.trim();
    if (!rawQuery) return;

    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');

    if (!getApiKey()) {
        statusEl.textContent = 'Bitte zuerst den Anthropic API Key eingeben (siehe oben).';
        return;
    }

    statusEl.textContent = 'Suche läuft...';
    resultsEl.style.display = 'none';

    try {
        const { reviewQuery, fallbackQuery } = optimizeQuery(rawQuery);
        let usedQuery = reviewQuery;
        let isReviewSearch = true;

        // Zuerst mit Review-Filter suchen
        let data = await searchPubMed(reviewQuery);
        let result = data.esearchresult;

        // Fallback: Wenn weniger als 5 Review-Treffer, alle Artikel suchen
        if (parseInt(result.count) < 5) {
            data = await searchPubMed(fallbackQuery);
            result = data.esearchresult;
            usedQuery = fallbackQuery;
            isReviewSearch = false;
        }

        const count = parseInt(result.count);
        const ids = result.idlist;

        // Keine Treffer
        if (count === 0 || ids.length === 0) {
            statusEl.textContent = 'Keine Artikel gefunden. Bitte anderen Suchbegriff versuchen oder englische Fachbegriffe verwenden.';
            resultsEl.style.display = 'none';
            return;
        }

        const filterHint = isReviewSearch ? ' (Reviews/Meta-Analysen bevorzugt)' : ' (alle Artikeltypen)';
        statusEl.textContent = `${ids.length} Artikel werden abgerufen...`;

        // EFetch: Abstracts und Metadaten laden
        const articles = await fetchArticles(ids);

        if (articles.length === 0) {
            statusEl.textContent = 'Artikeldaten konnten nicht geladen werden. Bitte erneut versuchen.';
            resultsEl.style.display = 'none';
            return;
        }

        statusEl.textContent = `${articles.length} Artikel geladen. Claude analysiert...`;

        // Claude Synthese
        const synthesis = await synthesizeWithClaude(articles, rawQuery);

        statusEl.textContent = `${count} Treffer, ${articles.length} Artikel analysiert${filterHint}`;
        resultsEl.innerHTML = '';
        resultsEl.style.display = 'block';

        // Synthese als formatiertes HTML rendern (Markdown-artig)
        const synthesisHtml = synthesis
            .replace(/## (.*)/g, '<h2>$1</h2>')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n\n/g, '</p><p>')
            .replace(/\n- /g, '</p><li>')
            .replace(/\n/g, '<br>');
        resultsEl.innerHTML = `<div style="white-space:normal;">${synthesisHtml}</div>`;

        // Artikel-Daten für spätere Tasks (Quellenliste) im DOM speichern
        window._lastArticles = articles;
    } catch (err) {
        statusEl.textContent = err.message;
        resultsEl.style.display = 'none';
    }
});
</script>
</body>
</html>
